<!DOCTYPE html>
<html>
<head>
    <title>Subway Surfers UI</title>
    <link rel="stylesheet" href="styleapp.css">
</head>
<body>

    <!-- Fake Loading Screen -->
    <div class="loading-screen">
        <h1>Subway Surfers</h1>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>

    <!-- Game UI -->

    <div class="main-background">
    <img src="https://lh6.googleusercontent.com/proxy/vI6IZKb8YSAdk-e1RdNCRNEcTO7EjtvWPTrMcoQX81C3arEetcLLZqqbW5yuNw7fNK9Jj7E7FMoiKymsT8bkvUdAoeY2b64vobbQDaieBDumtQv4ujf0_nzG8ms"
         class="bg-image"
         alt="Main Background">
</div>

    <div class="game-container">

        <div class="top-bar">
            <div class="currency">
                <img src="https://png.pngtree.com/png-vector/20240930/ourmid/pngtree-3d-gold-dollar-coin-png-image_13991316.png">
                <span>1250</span>
            </div>
            <div class="currency">
                <img src="images/key.png">
                <span>15</span>
            </div>
        </div>

        <img src="https://www.vhv.rs/dpng/d/23-233072_subway-surfers-logo-png-transparent-png.png" class="logo">
        <img src="https://w7.pngwing.com/pngs/900/927/png-transparent-subway-surfers-jake-hands-up-games-subway-surfers-thumbnail.png" class="character">

        <div class="play-btn">PLAY</div>

        <div class="bottom-menu">
            <div>Shop</div>
            <div>Missions</div>
            <div>Me</div>
        </div>

    </div>

</body>
</html>
